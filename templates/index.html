
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-12">
            <div class="card shadow p-4">

                <h3 class="text-center mb-3">AI Resume Analyzer</h3>
                <p class="text-center text-muted">
                    Upload your resume and get actionable feedback
                </p>

                <form method="post" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Upload Resume (PDF only)</label>
                        <input type="file" class="form-control" name="resume" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Select Job Role</label>
                        <select class="form-select" name="job_role" required>
                            <option value="">-- Select --</option>
                            <option value="software_engineer">Software Engineer</option>
                            <option value="java_developer">Java Developer</option>
                            <option value="python_developer">Python Developer</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary">Analyze Resume</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
